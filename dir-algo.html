<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>机试知识点（算法 & C++ 速查）目录</title>
  <style>
    :root {
        --primary-color: #2563eb;
        --secondary-color: #1e40af;
        --accent-color: #f59e0b;
        --bg-color: #f8fafc;
        --text-color: #1e293b;
        --card-bg: #ffffff;
        --border-radius: 12px;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;line-height:1.65;color:var(--text-color);background-color:var(--bg-color);padding:20px}
    .container{max-width:980px;margin:0 auto;background:var(--card-bg);padding:34px;border-radius:var(--border-radius);box-shadow:var(--shadow)}
    header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;padding-bottom:16px;margin-bottom:18px}
    h1{color:var(--secondary-color);font-size:1.8rem;line-height:1.2}
    .subtitle{color:#64748b;font-size:1rem;margin-top:8px;max-width:62ch}
    .tag{display:inline-block;background:#eff6ff;color:var(--primary-color);padding:4px 12px;border-radius:999px;font-size:.85rem;font-weight:650;margin:4px 6px 0 0}
    a{color:inherit}
    .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-weight:700;color:var(--primary-color);padding:8px 12px;border-radius:999px;background:#eff6ff}
    .back:hover{background:#dbeafe}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:14px}
    .card{border:1px solid #e2e8f0;border-radius:12px;padding:16px;background:#fff;box-shadow:var(--shadow)}
    .card h2{font-size:1.05rem;color:var(--secondary-color);margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .card p{color:#475569;font-size:.95rem}

    .toc{margin-top:14px}
    details{border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;padding:12px 14px}
    details+details{margin-top:10px}
    summary{cursor:pointer;font-weight:800;color:var(--secondary-color)}
    ol{padding-left:20px;margin-top:10px;color:#475569}
    li{margin:6px 0}
    .hint{margin-top:14px;color:#64748b;font-size:.92rem}

    footer{margin-top:22px;padding-top:14px;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:.82rem}
    @media (max-width:600px){.container{padding:20px} h1{font-size:1.5rem}}

    .preview-lock{margin-top:12px;padding:10px 12px;border:1px dashed #f59e0b;background:#fffbeb;border-radius:10px;color:#92400e;font-size:.9rem}
    .masked-item{color:#94a3b8;font-style:italic}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>机试知识点（算法 & C++ 速查）目录</h1>
        <p class="subtitle">模板与套路覆盖：基础算法/数据结构/图论/DP/贪心。</p>
        <div style="margin-top:8px"><span class="tag">⚡ 机试速查</span><span class="tag">¥19 单项</span></div>
      </div>
      <a class="back" href="./index.html">← 返回主页</a>
    </header>

    <section class="toc">
      <details open>
        <summary>目录预览（前 3 项）</summary>
        <ol>
          <li>C++Lambda 表达式</li>
          <li>比较代码（对拍）</li>
          <li>算法基础课基础算法快速排序</li>
        </ol>
        <p class="hint" style="margin-top:8px">本页共 <b>52</b> 项，未展示 <b>49</b> 项；购买后解锁完整目录。</p>
      </details>

      <p class="hint">当前仅展示部分子目录预览；完整目录与内容请购买后获取。</p>
          <div class="preview-lock">🔒 为防止内容被搬运，当前页面仅展示部分子目录。</div>
    </section>

    <footer>© Saberlve｜资料目录页（仅展示部分目录结构）</footer>
  </div>
</body>
</html>
